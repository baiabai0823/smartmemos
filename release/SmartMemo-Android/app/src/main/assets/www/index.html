<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#05070b" />
    <title>SmartMemo iPhone</title>
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/smartmemo-logo-32.png" />
    <link rel="icon" type="image/png" sizes="64x64" href="./assets/smartmemo-logo-64.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./assets/smartmemo-logo-180.png" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="smartmemoSplash" class="smartmemo-splash" aria-hidden="true">
      <div class="splash-paper"></div>
      <div class="splash-logo-wrap">
        <img src="./assets/smartmemo-logo-256.png" alt="" />
        <i></i><i></i><i></i><i></i>
      </div>
    </div>
    <main id="app" class="app-shell"></main>
    <input id="imagePicker" class="hidden-input" type="file" accept="image/*" multiple />
    <input id="backupPicker" class="hidden-input" type="file" accept=".smemo,application/octet-stream" />
    <script src="./app.js"></script>
  </body>
</html>
