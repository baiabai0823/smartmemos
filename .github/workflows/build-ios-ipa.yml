name: Build SmartMemo IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "iphone-memo-app/**"
      - "release/SmartMemo-iOS/**"
      - ".github/workflows/build-ios-ipa.yml"

permissions:
  contents: read

jobs:
  build-unsigned-ipa:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: release/SmartMemo-iOS/package-lock.json

      - name: Prepare iOS web assets
        shell: bash
        run: |
          rm -rf release/SmartMemo-iOS/www
          mkdir -p release/SmartMemo-iOS/www
          cp -R iphone-memo-app/. release/SmartMemo-iOS/www/

      - name: Install Capacitor
        working-directory: release/SmartMemo-iOS
        run: npm ci

      - name: Create native iOS project
        working-directory: release/SmartMemo-iOS
        run: |
          npx cap add ios
          npx cap sync ios



      - name: Configure iPhone application
        shell: bash
        run: |
          PLIST="release/SmartMemo-iOS/ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName SmartMemo" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.1.2" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion 4" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" "$PLIST" || \
            /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string SmartMemo uses selected photos only when you insert them into a memo." "$PLIST" || true
          /usr/libexec/PlistBuddy -c "Add :UIFileSharingEnabled bool true" "$PLIST" || \
            /usr/libexec/PlistBuddy -c "Set :UIFileSharingEnabled true" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :LSSupportsOpeningDocumentsInPlace bool true" "$PLIST" || \
            /usr/libexec/PlistBuddy -c "Set :LSSupportsOpeningDocumentsInPlace true" "$PLIST"

      - name: Build unsigned archive
        shell: bash
        run: |
          cd release/SmartMemo-iOS/ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/SmartMemo.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            archive

      - name: Create unsigned IPA
        shell: bash
        run: |
          APP_PATH="$RUNNER_TEMP/SmartMemo.xcarchive/Products/Applications/App.app"
          test -d "$APP_PATH"
          mkdir -p "$RUNNER_TEMP/Payload"
          cp -R "$APP_PATH" "$RUNNER_TEMP/Payload/SmartMemo.app"
          cd "$RUNNER_TEMP"
          /usr/bin/zip -qry "$GITHUB_WORKSPACE/SmartMemo-unsigned.ipa" Payload
          shasum -a 256 "$GITHUB_WORKSPACE/SmartMemo-unsigned.ipa" > "$GITHUB_WORKSPACE/SmartMemo-unsigned.ipa.sha256"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartMemo-iOS-unsigned
          path: |
            SmartMemo-unsigned.ipa
            SmartMemo-unsigned.ipa.sha256
          if-no-files-found: error
          retention-days: 30
